background-color=#141618
text-color=#f6a3a9
border-color=#262a2d
progress-color=over #301C2B
width=420
height=110
padding=12
border-size=2
border-radius=12
font=Liberation Sans 11
anchor=top-right
outer-margin=20
default-timeout=5000
max-icon-size=32
icons=1
markup=1
format=<b>%s</b>\n%b

[urgency=low]
background-color=#141618
text-color=#5A3C8A
border-color=#262a2d
default-timeout=3000

[urgency=normal]
background-color=#141618
text-color=#f6a3a9
border-color=#262a2d
default-timeout=5000

[urgency=high]
background-color=#141618
text-color=#ffffff
border-color=#e46a7a
default-timeout=0

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false
